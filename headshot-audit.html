<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headshot Audit — AAHL</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0d0608;color:#f2eef0;min-height:100vh;padding:32px 24px}
h1{font-family:'Teko',sans-serif;font-size:28px;font-weight:600;letter-spacing:1px;margin-bottom:4px}
.sub{font-size:13px;color:#a08890;margin-bottom:24px}

.summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px}
.stat{background:#1f0f13;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 20px;min-width:120px}
.stat-val{font-family:'Teko',sans-serif;font-size:28px;font-weight:700;line-height:1}
.stat-val.green{color:#22d37a}
.stat-val.red{color:#c0392b}
.stat-val.gold{color:#A2AAAD}
.stat-lbl{font-size:11px;color:#a08890;margin-top:3px;letter-spacing:0.5px;text-transform:uppercase}

.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Teko',sans-serif;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s}
.btn-primary{background:#6F263D;color:#fff}
.btn-primary:hover{background:#8f3050}
.btn-ghost{background:none;border:1px solid rgba(255,255,255,0.15);color:#a08890}
.btn-ghost:hover{border-color:rgba(255,255,255,0.3);color:#f2eef0}
.btn-ghost.active{background:rgba(255,255,255,0.08);color:#f2eef0;border-color:rgba(255,255,255,0.25)}
.filter-bar{display:flex;gap:6px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.card{background:#160a0d;border:1px solid rgba(255,255,255,0.07);border-radius:10px;overflow:hidden;transition:border-color 0.2s}
.card.ok{border-color:rgba(34,211,122,0.3)}
.card.fail{border-color:rgba(192,57,43,0.35)}
.card.noid{border-color:rgba(162,170,173,0.2)}
.card.loading{border-color:rgba(255,255,255,0.07)}

.hs-wrap{width:100%;height:110px;background:#1f0f13;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.hs-wrap img{width:100%;height:100%;object-fit:cover;object-position:top center}
.hs-ini{font-family:'Teko',sans-serif;font-size:28px;font-weight:700;color:#2a1419}
.hs-spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.1);border-top-color:#6F263D;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.badge{position:absolute;top:6px;right:6px;font-family:'Teko',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.5px;padding:2px 6px;border-radius:4px}
.badge-ok{background:rgba(34,211,122,0.9);color:#000}
.badge-fail{background:rgba(192,57,43,0.9);color:#fff}
.badge-noid{background:rgba(162,170,173,0.7);color:#000}

.card-body{padding:8px 10px}
.card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-family:'Teko',sans-serif;font-size:10px;color:#a08890;margin-top:2px;display:flex;justify-content:space-between}
.card-id{font-family:'Teko',sans-serif;font-size:9px;color:#7a6870;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-url-btn{font-family:'Teko',sans-serif;font-size:9px;color:#236192;cursor:pointer;text-decoration:underline;margin-top:2px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.progress-bar{background:#1f0f13;border-radius:100px;height:4px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#6F263D,#236192);transition:width 0.3s ease}

.empty{text-align:center;padding:60px;color:#a08890;font-family:'Teko',sans-serif;font-size:14px}
.fail-list{background:#160a0d;border:1px solid rgba(192,57,43,0.25);border-radius:10px;padding:16px 20px;margin-top:20px}
.fail-list h3{font-family:'Teko',sans-serif;font-size:12px;color:#c0392b;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase}
.fail-list-item{font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:#f2eef0;display:flex;gap:8px;align-items:center}
.fail-list-item:last-child{border-bottom:none}
.fail-list-item .team{font-family:'Teko',sans-serif;font-size:10px;color:#a08890;width:32px;flex-shrink:0}
.fail-list-item .pid{font-family:'Teko',sans-serif;font-size:10px;color:#7a6870;margin-left:auto}
</style>
</head>
<body>

<h1>🏒 Headshot Audit</h1>
<div class="sub">Tests every player headshot URL against the NHL CDN — green = loaded, red = failed, grey = no ID</div>

<div class="summary">
  <div class="stat"><div class="stat-val gold" id="s-total">—</div><div class="stat-lbl">Total Players</div></div>
  <div class="stat"><div class="stat-val green" id="s-ok">—</div><div class="stat-lbl">✓ Headshot OK</div></div>
  <div class="stat"><div class="stat-val red" id="s-fail">—</div><div class="stat-lbl">✗ Failed</div></div>
  <div class="stat"><div class="stat-val" style="color:#7a6870" id="s-noid">—</div><div class="stat-lbl">No Player ID</div></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<div class="controls">
  <button class="btn btn-primary" onclick="runAudit()">▶ Run Audit</button>
  <div class="filter-bar">
    <button class="btn btn-ghost active" id="f-all" onclick="setFilter('all',this)">All</button>
    <button class="btn btn-ghost" id="f-ok" onclick="setFilter('ok',this)">✓ OK</button>
    <button class="btn btn-ghost" id="f-fail" onclick="setFilter('fail',this)">✗ Failed</button>
    <button class="btn btn-ghost" id="f-noid" onclick="setFilter('noid',this)">No ID</button>
  </div>
</div>

<div id="grid" class="grid"><div class="empty">Click "Run Audit" to test all headshots</div></div>
<div id="fail-summary"></div>

<script>
const PLAYERS_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQlbZGgMZjZhJIVIJoXKNASqTsn-sYJN5u9QmUGKGaJDdqXHbNSxbCeWR4qkS1PqCnP5AvVezXwOMzj/pub?gid=1949508708&single=true&output=csv&t=' + Date.now();

const TEAM_ABBREV = {
  'ANA':'ANA','BOS':'BOS','BUF':'BUF','CAR':'CAR','CBJ':'CBJ',
  'CGY':'CGY','CHI':'CHI','COL':'COL','DAL':'DAL','DET':'DET',
  'EDM':'EDM','FLA':'FLA','LA':'LAK','MIN':'MIN','MTL':'MTL',
  'NJ':'NJD','NSH':'NSH','NYI':'NYI','NYR':'NYR','OTT':'OTT',
  'PHI':'PHI','PIT':'PIT','SEA':'SEA','STL':'STL','TB':'TBL',
  'TOR':'TOR','UTA':'UTA','VAN':'VAN','VGK':'VGK','WSH':'WSH',
  'WPG':'WPG','ARI':'ARI',
};
const SEASON = '20252026';

let players = [], currentFilter = 'all', results = {};

async function loadPlayers() {
  const res = await fetch(PLAYERS_CSV);
  const text = await res.text();
  const lines = text.trim().split('\n').slice(2); // skip 2 header rows
  return lines.map(line => {
    const cols = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch==='"'){inQ=!inQ;}
      else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    return {
      name: (cols[0]||'').trim(),
      team: (cols[1]||'').trim(),
      pos:  (cols[2]||'').trim(),
      id:   (cols[16]||'').trim(),
    };
  }).filter(p => p.name && p.pos);
}

function getHeadshotUrl(player) {
  if (!player.id) return null;
  const team = TEAM_ABBREV[player.team] || player.team;
  return `https://assets.nhle.com/mugs/nhl/${SEASON}/${team}/${player.id}.png`;
}

function testImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve({ ok: true, url });
    img.onerror = () => resolve({ ok: false, url });
    img.src = url;
  });
}

async function runAudit() {
  document.getElementById('grid').innerHTML = '<div class="empty">Loading players…</div>';
  document.getElementById('fail-summary').innerHTML = '';
  results = {};

  try {
    players = await loadPlayers();
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty">Failed to load players: ${e.message}</div>`;
    return;
  }

  updateStats();
  renderGrid();

  // Test each headshot
  let done = 0;
  const promises = players.map(async (p, i) => {
    const url = getHeadshotUrl(p);
    let status, result;

    if (!p.id) {
      status = 'noid'; result = { ok: false, url: null };
    } else {
      result = await testImage(url);
      status = result.ok ? 'ok' : 'fail';
    }

    results[p.name] = { status, url: result.url, player: p };
    done++;
    document.getElementById('progress').style.width = Math.round(done / players.length * 100) + '%';
    updateCard(i, p, status, result.url);
    updateStats();
  });

  await Promise.all(promises);
  document.getElementById('progress').style.width = '100%';
  renderFailSummary();
}

function updateCard(i, p, status, url) {
  const card = document.getElementById(`card-${i}`);
  if (!card) return;
  card.className = `card ${status}`;
  const wrap = card.querySelector('.hs-wrap');
  const ini = p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  if (status === 'ok' && url) {
    wrap.innerHTML = `<img src="${url}" alt="${p.name}"><span class="badge badge-ok">✓</span>`;
  } else if (status === 'fail') {
    wrap.innerHTML = `<span class="hs-ini">${ini}</span><span class="badge badge-fail">✗</span>`;
  } else {
    wrap.innerHTML = `<span class="hs-ini">${ini}</span><span class="badge badge-noid">—</span>`;
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const ini = p => p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  grid.innerHTML = players.map((p, i) => {
    const url = getHeadshotUrl(p);
    const team3 = TEAM_ABBREV[p.team] || p.team;
    return `<div class="card loading" id="card-${i}" data-status="loading" data-name="${p.name.toLowerCase()}">
      <div class="hs-wrap"><div class="hs-spinner"></div></div>
      <div class="card-body">
        <div class="card-name" title="${p.name}">${p.name}</div>
        <div class="card-meta"><span>${team3}</span><span>${p.pos}</span></div>
        <div class="card-id">${p.id || 'NO ID'}</div>
        ${url ? `<span class="card-url-btn" onclick="navigator.clipboard.writeText('${url}').then(()=>alert('Copied!'))" title="${url}">Copy URL</span>` : ''}
      </div>
    </div>`;
  }).join('');

  applyFilter();
}

function updateStats() {
  const ok   = Object.values(results).filter(r => r.status==='ok').length;
  const fail = Object.values(results).filter(r => r.status==='fail').length;
  const noid = Object.values(results).filter(r => r.status==='noid').length;
  document.getElementById('s-total').textContent = players.length;
  document.getElementById('s-ok').textContent    = ok;
  document.getElementById('s-fail').textContent  = fail;
  document.getElementById('s-noid').textContent  = noid;
}

function renderFailSummary() {
  const fails = Object.values(results).filter(r => r.status==='fail' || r.status==='noid');
  if (!fails.length) { document.getElementById('fail-summary').innerHTML = ''; return; }

  const items = fails.map(r => {
    const p = r.player;
    const label = r.status==='noid' ? 'No ID in sheet' : 'CDN 404';
    const color = r.status==='noid' ? '#7a6870' : '#c0392b';
    return `<div class="fail-list-item">
      <span class="team">${p.team}</span>
      <span>${p.name}</span>
      <span style="font-family:'Teko',sans-serif;font-size:9px;color:${color};margin-left:auto">${label}</span>
      <span class="pid">${p.id||'—'}</span>
    </div>`;
  }).join('');

  document.getElementById('fail-summary').innerHTML = `
    <div class="fail-list">
      <h3>⚠️ ${fails.length} players need attention</h3>
      ${items}
    </div>`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.card').forEach((card, i) => {
    if (!players[i]) return;
    const r = results[players[i].name];
    const status = r ? r.status : 'loading';
    if (currentFilter === 'all' || currentFilter === status || (currentFilter==='loading' && !r)) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });
}
</script>
</body>
</html>
